suspicious_domains:
  - pattern: '(?i)\.(duckdns\.org|no-ip\.com|no-ip\.org|dynu\.net|3322\.org|f3322\.net|oray\.com)$'
    description: "Dynamic DNS provider"
    level: medium
  - pattern: '(?i)\.(tk|ml|ga|cf|gq)$'
    description: "Free TLD with high abuse rate"
    level: medium
  - pattern: '(?i)(ngrok\.io|ngrok-free\.app|portmap\.io|localtunnel\.me|serveo\.net|natapp\.(cn|cc)|cpolar\.(cn|com)|trycloudflare\.com|cloudflared|workers\.dev|pages\.dev|glitch\.me|replit\.dev)'
    description: "Tunneling or temporary hosting service"
    level: high
  - pattern: '(?i)(pool\.minexmr\.com|supportxmr\.com|hashvault\.pro|nanopool\.org|moneroocean\.stream|c3pool\.org|nicehash\.com|xmrpool|xmr-stak|xmrig|stratum\+tcp|stratum\+ssl|pool\.[a-z0-9.-]*(xmr|monero|mine))'
    description: "Cryptomining pool or Stratum indicator"
    level: high
  - pattern: '(?i)(pastebin\.com|paste\.rs|hastebin\.com|raw\.githubusercontent\.com|gist\.githubusercontent\.com|gitlab\.com/.*/-/raw/|gitee\.com/.*/raw/|transfer\.sh|file\.io|anonfiles|cdn\.discordapp\.com)'
    description: "Common paste/raw hosting used for payload staging"
    level: low
  - pattern: '(?i)(discord(app)?\.com/api/webhooks|api\.telegram\.org/bot|t\.me/)'
    description: "Common webhook or bot API used for exfiltration/control"
    level: medium
  - pattern: '(?i)(\.onion|tor2web|i2p)'
    description: "Anonymous network indicator"
    level: high
  - pattern: '(?i)(frp|frpc|frps|nps|npc|chisel|gost|stowaway|ligolo|venom|iox|earthworm|ew_for_linux|ew_for_win)'
    description: "Proxy/tunnel tool keyword in command line"
    level: high
  - pattern: '(?i)(fscan|kscan|masscan|zmap|nuclei|afrog|ehole|goby|ladon)'
    description: "Reconnaissance/scanner tool keyword in command line"
    level: high
  - pattern: '(?i)(weblogic|fastjson|jndi:ldap|jndi:rmi|ldap://|rmi://)'
    description: "Exploit staging keyword in command line or hosts"
    level: medium

connection_patterns:
  - name: "many_external_connections"
    description: "Single process maintains many external established connections"
    level: medium
    threshold: 20
  - name: "possible_scanner_or_bot"
    description: "Single process maintains unusually many external connections; possible scanner, proxy or bot"
    level: high
    threshold: 80
