# 高危端口：outbound 检测外联，inbound 检测对外监听，any 两者都匹配。
malicious_ports:
  - port: 4444
    protocol: "tcp"
    direction: "any"
    description: "Metasploit/reverse shell common listener"
    malware_families: ["Metasploit", "reverse-shell"]
    level: critical
  - port: 1337
    protocol: "tcp"
    direction: "any"
    description: "Common backdoor/C2 port"
    malware_families: ["backdoor"]
    level: high
  - port: 31337
    protocol: "tcp"
    direction: "any"
    description: "Classic backdoor port"
    malware_families: ["Back Orifice", "backdoor"]
    level: high
  - port: 5555
    protocol: "tcp"
    direction: "any"
    description: "ADB/common backdoor port"
    malware_families: ["ADB", "backdoor"]
    level: medium
  - port: 6666
    protocol: "tcp"
    direction: "any"
    description: "IRC/botnet common port"
    malware_families: ["IRC botnet"]
    level: medium
  - port: 6667
    protocol: "tcp"
    direction: "any"
    description: "IRC protocol / legacy botnets"
