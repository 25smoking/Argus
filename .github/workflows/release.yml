name: build-and-release

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag, for example v3.0.0. Leave empty to use the current ref."
        required: false
        default: ""
      publish_release:
        description: "Upload build packages to a GitHub Release."
        required: false
        type: boolean
        default: false
      bundle_rules:
        description: "Download upstream YARA rules into the release package .rule directory."
        required: false
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  APP_NAME: argus
  YARA_X_VERSION: v1.16.0
  RELEASE_VERSION: ${{ inputs.release_tag || (contains(github.event.head_commit.message, '[publish-v3.0.0]') && 'v3.0.0') || github.ref_name }}
  BUNDLE_RULES: ${{ startsWith(github.ref, 'refs/tags/v') || inputs.bundle_rules == true || contains(github.event.head_commit.message, '[publish-v3.0.0]') }}

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential curl git pkg-config

      - name: Set up Rust
        run: |
          if ! command -v cargo >/dev/null 2>&1; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal
          fi
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Build YARA-X CAPI
        shell: bash
        run: |
          set -euo pipefail
          capi_dir="$RUNNER_TEMP/yara-x-capi"
          git clone --depth 1 --branch "$YARA_X_VERSION" https://github.com/VirusTotal/yara-x.git "$RUNNER_TEMP/yara-x"
          cargo build --release --package yara-x-capi --manifest-path "$RUNNER_TEMP/yara-x/Cargo.toml"
          mkdir -p "$capi_dir/include" "$capi_dir/lib/pkgconfig"
          cp "$RUNNER_TEMP/yara-x/target/release/libyara_x_capi.a" "$capi_dir/lib/"
          cp "$RUNNER_TEMP/yara-x/capi/include/yara_x.h" "$capi_dir/include/"
          cat > "$capi_dir/lib/pkgconfig/yara_x_capi.pc" <<EOF
          prefix=$capi_dir
          exec_prefix=\${prefix}
          libdir=\${exec_prefix}/lib
          includedir=\${prefix}/include
          Name: yara_x_capi
          Description: YARA-X C API static package
          Version: 1.16.0
          Libs: \${libdir}/libyara_x_capi.a -ldl -lpthread -lm
          Cflags: -I\${includedir}
          EOF
          echo "PKG_CONFIG_PATH=$capi_dir/lib/pkgconfig" >> "$GITHUB_ENV"
          echo "PKG_CONFIG_LIBDIR=$capi_dir/lib/pkgconfig" >> "$GITHUB_ENV"

      - name: Test
        run: go test ./...

  build:
    name: build ${{ matrix.target }}
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-amd64
            os: ubuntu-latest
            archive: tar.gz
          - target: darwin-arm64
            os: macos-14
            archive: tar.gz
          - target: windows-amd64
            os: windows-latest
            archive: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        if: runner.os != 'Windows'
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential curl git musl-tools pkg-config

      - name: Set up Rust on Unix
        if: runner.os != 'Windows'
        run: |
          if ! command -v cargo >/dev/null 2>&1; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal
          fi
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Build YARA-X CAPI on Linux
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          capi_dir="$RUNNER_TEMP/yara-x-capi"
          rustup target add x86_64-unknown-linux-musl
          git clone --depth 1 --branch "$YARA_X_VERSION" https://github.com/VirusTotal/yara-x.git "$RUNNER_TEMP/yara-x"
          cargo build --release --package yara-x-capi --target x86_64-unknown-linux-musl --manifest-path "$RUNNER_TEMP/yara-x/Cargo.toml"
          mkdir -p "$capi_dir/include" "$capi_dir/lib/pkgconfig"
          cp "$RUNNER_TEMP/yara-x/target/x86_64-unknown-linux-musl/release/libyara_x_capi.a" "$capi_dir/lib/"
          cp "$RUNNER_TEMP/yara-x/capi/include/yara_x.h" "$capi_dir/include/"
          cat > "$capi_dir/lib/pkgconfig/yara_x_capi.pc" <<EOF
          prefix=$capi_dir
          exec_prefix=\${prefix}
          libdir=\${exec_prefix}/lib
          includedir=\${prefix}/include
          Name: yara_x_capi
          Description: YARA-X C API static package
          Version: 1.16.0
          Libs: \${libdir}/libyara_x_capi.a -ldl -lpthread -lm -lc
          Cflags: -I\${includedir}
          EOF
          echo "PKG_CONFIG_PATH=$capi_dir/lib/pkgconfig" >> "$GITHUB_ENV"
          echo "PKG_CONFIG_LIBDIR=$capi_dir/lib/pkgconfig" >> "$GITHUB_ENV"

      - name: Build YARA-X CAPI on macOS
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          capi_dir="$RUNNER_TEMP/yara-x-capi"
          git clone --depth 1 --branch "$YARA_X_VERSION" https://github.com/VirusTotal/yara-x.git "$RUNNER_TEMP/yara-x"
          cargo build --release --package yara-x-capi --manifest-path "$RUNNER_TEMP/yara-x/Cargo.toml"
          mkdir -p "$capi_dir/include" "$capi_dir/lib/pkgconfig"
          cp "$RUNNER_TEMP/yara-x/target/release/libyara_x_capi.a" "$capi_dir/lib/"
          cp "$RUNNER_TEMP/yara-x/capi/include/yara_x.h" "$capi_dir/include/"
          cat > "$capi_dir/lib/pkgconfig/yara_x_capi.pc" <<EOF
          prefix=$capi_dir
          exec_prefix=\${prefix}
          libdir=\${exec_prefix}/lib
          includedir=\${prefix}/include
          Name: yara_x_capi
          Description: YARA-X C API static package
          Version: 1.16.0
          Libs: \${libdir}/libyara_x_capi.a -liconv -lSystem -lc -lm
          Cflags: -I\${includedir}
          EOF
          echo "PKG_CONFIG_PATH=$capi_dir/lib/pkgconfig" >> "$GITHUB_ENV"
          echo "PKG_CONFIG_LIBDIR=$capi_dir/lib/pkgconfig" >> "$GITHUB_ENV"

      - name: Install Windows build dependencies
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            git
            base-devel
            zip
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-go
            mingw-w64-x86_64-pkgconf
            mingw-w64-x86_64-rust

      - name: Build and package on Unix
        if: runner.os != 'Windows'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          version="${RELEASE_VERSION:-${GITHUB_REF_NAME}}"
          version="${version//\//-}"
          commit="${GITHUB_SHA::7}"
          build_time="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          pkg="argus-${version}-${{ matrix.target }}"
          pkg_dir="dist/${pkg}"
          mkdir -p "$pkg_dir"

          if [[ "${{ matrix.target }}" == "linux-amd64" ]]; then
            CGO_ENABLED=1 GOOS=linux GOARCH=amd64 CC=musl-gcc \
              go build -a -tags static_link -trimpath \
                -ldflags "-s -w -buildid= -linkmode external -extldflags '-static' -X main.version=${version} -X main.commit=${commit} -X main.buildTime=${build_time}" \
                -o "$pkg_dir/argus" ./cmd/argus
            file "$pkg_dir/argus"
          else
            CGO_ENABLED=1 GOOS=darwin GOARCH=arm64 \
              go build -a -tags static_link -trimpath \
                -ldflags "-s -w -buildid= -X main.version=${version} -X main.commit=${commit} -X main.buildTime=${build_time}" \
                -o "$pkg_dir/argus" ./cmd/argus
            otool -L "$pkg_dir/argus"
          fi

          chmod +x "$pkg_dir/argus"
          cp -R config "$pkg_dir/config"
          cp README.md README_EN.md README_JP.md LICENSE SECURITY.md FALSE_POSITIVE.md PRIVACY.md RULES_LICENSE.md "$pkg_dir/"

          if [[ "$BUNDLE_RULES" == "true" ]]; then
            "$pkg_dir/argus" --rules-dir "$pkg_dir/.rule" rules update --source upstream
            "$pkg_dir/argus" --rules-dir "$pkg_dir/.rule" rules verify
          fi

          tar -C dist -czf "dist/${pkg}.tar.gz" "$pkg"
          shasum -a 256 "dist/${pkg}.tar.gz" > "dist/${pkg}.tar.gz.sha256"

      - name: Build and package on Windows
        if: runner.os == 'Windows'
        shell: msys2 {0}
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          export PATH="/mingw64/bin:/usr/bin:$PATH"
          version="${RELEASE_VERSION:-${GITHUB_REF_NAME}}"
          version="${version//\//-}"
          commit="${GITHUB_SHA:0:7}"
          build_time="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          pkg="argus-${version}-${{ matrix.target }}"
          pkg_dir="dist/${pkg}"
          capi_dir="/tmp/yara-x-capi"
          mkdir -p "$pkg_dir" "$capi_dir/include" "$capi_dir/lib/pkgconfig"

          git clone --depth 1 --branch "$YARA_X_VERSION" https://github.com/VirusTotal/yara-x.git /tmp/yara-x
          cargo build --release --package yara-x-capi --target x86_64-pc-windows-gnu --manifest-path /tmp/yara-x/Cargo.toml --target-dir /tmp/yara-x-target
          cp /tmp/yara-x-target/x86_64-pc-windows-gnu/release/libyara_x_capi.a "$capi_dir/lib/"
          cp /tmp/yara-x/capi/include/yara_x.h "$capi_dir/include/"
          cat > "$capi_dir/lib/pkgconfig/yara_x_capi.pc" <<EOF
          prefix=$capi_dir
          exec_prefix=\${prefix}
          libdir=\${exec_prefix}/lib
          includedir=\${prefix}/include
          Name: yara_x_capi
          Description: YARA-X C API static package
          Version: 1.16.0
          Libs: \${libdir}/libyara_x_capi.a -lws2_32 -lbcrypt -lntdll -luserenv -ladvapi32 -lcrypt32 -lsecur32
          Cflags: -I\${includedir}
          EOF

          CGO_ENABLED=1 \
          GOOS=windows \
          GOARCH=amd64 \
          CC=gcc \
          PKG_CONFIG=pkg-config \
          PKG_CONFIG_PATH="$capi_dir/lib/pkgconfig" \
          PKG_CONFIG_LIBDIR="$capi_dir/lib/pkgconfig" \
          go build -a -tags static_link -trimpath \
            -ldflags "-s -w -buildid= -linkmode external -extldflags '-static' -X main.version=${version} -X main.commit=${commit} -X main.buildTime=${build_time}" \
            -o "$pkg_dir/argus.exe" ./cmd/argus
          test -f "$pkg_dir/argus.exe"

          cp -R config "$pkg_dir/config"
          cp README.md README_EN.md README_JP.md LICENSE SECURITY.md FALSE_POSITIVE.md PRIVACY.md RULES_LICENSE.md "$pkg_dir/"

          if [[ "$BUNDLE_RULES" == "true" ]]; then
            "$pkg_dir/argus.exe" --rules-dir "$pkg_dir/.rule" rules update --source upstream
            "$pkg_dir/argus.exe" --rules-dir "$pkg_dir/.rule" rules verify
          fi

          (cd dist && zip -qr "${pkg}.zip" "$pkg")
          sha256sum "dist/${pkg}.zip" > "dist/${pkg}.zip.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: argus-${{ matrix.target }}
          path: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.sha256
          if-no-files-found: error

  publish:
    name: publish release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.publish_release && inputs.release_tag != '') || contains(github.event.head_commit.message, '[publish-v3.0.0]')
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_VERSION }}
          name: Argus ${{ env.RELEASE_VERSION }}
          body: |
            ## Argus ${{ env.RELEASE_VERSION }}

            - Ķ┐üń¦╗Õł░ YARA-X Go binding’╝īargus / argus.exe ÕŹĢµ¢ćõ╗ČķøåµłÉ YARA-X CAPIŃĆé
            - ÕÅæÕĖāÕīģÕåģńĮ«ÕÉīń║¦ķÜÉĶŚÅ .rule/ Õģ©ķćÅĶ¦äÕłÖÕ║ō’╝īķ”¢µ¼Īń”╗ń║┐ÕÅ»ńø┤µÄźµē½µÅÅŃĆé
            - õ┐ØµīüµŚóµ£ēµē½µÅÅĶŠōÕć║’╝ÜÕ╣│ÕÅ░Ķ┐ćµ╗żŃĆüWebshell/Malware Ķ¦äÕłÖÕŖĀĶĮĮń╗¤Ķ«ĪŃĆüĶ¦äÕłÖĶĘ│Ķ┐ćńŁ¢ńĢźŃĆüÕæĮõĖŁĶ¦äÕłÖÕÉŹÕÆīµŖźÕæŖÕŁŚµ«ĄÕģ╝Õ«╣ŃĆé
            - µ£¼µ¼ĪÕÅæÕĖāÕīģµÅÉõŠø macOS arm64ŃĆüLinux amd64ŃĆüWindows amd64 õ╗źÕÅŖ SHA256 µĀĪķ¬īµ¢ćõ╗ČŃĆé
          files: release-assets/*
          overwrite_files: true
          fail_on_unmatched_files: true