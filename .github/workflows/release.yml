name: build-and-release

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag, for example v3.0.0. Leave empty to use the current ref."
        required: false
        default: ""
      publish_release:
        description: "Upload build packages to a GitHub Release."
        required: false
        type: boolean
        default: false
      bundle_rules:
        description: "Download upstream YARA rules into the release package .rule directory."
        required: false
        type: boolean
        default: false

permissions:
  contents: write

env:
  APP_NAME: argus
  RELEASE_VERSION: ${{ inputs.release_tag || github.ref_name }}
  BUNDLE_RULES: ${{ startsWith(github.ref, 'refs/tags/v') || inputs.bundle_rules }}

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install libyara
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libyara-dev pkg-config

      - name: Test
        run: go test ./...

  build:
    name: build ${{ matrix.target }}
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-amd64
            os: ubuntu-latest
            archive: tar.gz
          - target: darwin-amd64
            os: macos-13
            archive: tar.gz
          - target: darwin-arm64
            os: macos-14
            archive: tar.gz
          - target: windows-amd64
            os: windows-latest
            archive: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install libyara on Linux
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libyara-dev pkg-config

      - name: Install libyara on macOS
        if: runner.os == 'macOS'
        run: brew install yara pkg-config

      - name: Install libyara on Windows
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            git
            base-devel
            autotools
            make
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-pkgconf
            mingw-w64-x86_64-openssl
            mingw-w64-x86_64-jansson
            mingw-w64-x86_64-file
            mingw-w64-x86_64-zlib

      - name: Build libyara on Windows
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          set -euo pipefail
          git clone --depth 1 --branch v4.5.4 https://github.com/VirusTotal/yara.git /tmp/yara
          cd /tmp/yara
          ./bootstrap.sh
          ./configure --prefix=/mingw64 --enable-magic --with-crypto
          make -j"$(nproc)"
          make install
          pkg-config --modversion yara

      - name: Build and package on Unix
        if: runner.os != 'Windows'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          version="${RELEASE_VERSION:-${GITHUB_REF_NAME}}"
          version="${version//\//-}"
          commit="${GITHUB_SHA::7}"
          build_time="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          pkg="argus-${version}-${{ matrix.target }}"
          pkg_dir="dist/${pkg}"

          mkdir -p "${pkg_dir}"
          CGO_ENABLED=1 go build \
            -trimpath \
            -ldflags "-s -w -buildid= -X main.version=${version} -X main.commit=${commit} -X main.buildTime=${build_time}" \
            -o "${pkg_dir}/argus" \
            ./cmd/argus

          cp -R config "${pkg_dir}/config"
          cp README.md LICENSE SECURITY.md FALSE_POSITIVE.md PRIVACY.md RULES_LICENSE.md "${pkg_dir}/"

          if [[ "${BUNDLE_RULES}" == "true" ]]; then
            "${pkg_dir}/argus" --rules-dir "${pkg_dir}/.rule" rules update --source upstream
            "${pkg_dir}/argus" --rules-dir "${pkg_dir}/.rule" rules verify
          fi

          tar -C dist -czf "dist/${pkg}.tar.gz" "${pkg}"
          shasum -a 256 "dist/${pkg}.tar.gz" > "dist/${pkg}.tar.gz.sha256"

      - name: Build and package on Windows
        if: runner.os == 'Windows'
        shell: msys2 {0}
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          export PATH="/mingw64/bin:/usr/bin:$PATH"
          version="${RELEASE_VERSION:-${GITHUB_REF_NAME}}"
          version="${version//\//-}"
          commit="${GITHUB_SHA:0:7}"
          build_time="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          pkg="argus-${version}-${{ matrix.target }}"
          pkg_dir="dist/${pkg}"

          mkdir -p "${pkg_dir}"
          command -v go
          command -v gcc
          command -v pkg-config
          pkg-config --modversion yara
          pkg-config --cflags --libs yara

          CGO_ENABLED=1 \
          CC=gcc \
          PKG_CONFIG=pkg-config \
          PKG_CONFIG_PATH=/mingw64/lib/pkgconfig \
          go build \
            -trimpath \
            -ldflags "-s -w -buildid= -X main.version=${version} -X main.commit=${commit} -X main.buildTime=${build_time}" \
            -o "${pkg_dir}/argus.exe" \
            ./cmd/argus
          test -f "${pkg_dir}/argus.exe"

          cp -R config "${pkg_dir}/config"
          cp README.md LICENSE SECURITY.md FALSE_POSITIVE.md PRIVACY.md RULES_LICENSE.md "${pkg_dir}/"

          dll_patterns=(
            'libyara*.dll'
            'libcrypto*.dll'
            'libssl*.dll'
            'libwinpthread-1.dll'
            'libjansson*.dll'
            'libmagic*.dll'
            'libgnurx*.dll'
            'libintl*.dll'
            'libiconv*.dll'
            'libpcre2-8-0.dll'
            'zlib1.dll'
            'libgcc_s_seh-1.dll'
          )
          for pattern in "${dll_patterns[@]}"; do
            for dll in /mingw64/bin/${pattern}; do
              [[ -e "${dll}" ]] && cp "${dll}" "${pkg_dir}/"
            done
          done

          if [[ "${BUNDLE_RULES}" == "true" ]]; then
            "${pkg_dir}/argus.exe" --rules-dir "${pkg_dir}/.rule" rules update --source upstream
            "${pkg_dir}/argus.exe" --rules-dir "${pkg_dir}/.rule" rules verify
          fi

          pkg_win="$(cygpath -w "${pkg_dir}")"
          zip_win="$(cygpath -w "dist/${pkg}.zip")"
          powershell.exe -NoProfile -Command "Compress-Archive -Path '${pkg_win}\\*' -DestinationPath '${zip_win}' -Force"
          sha256sum "dist/${pkg}.zip" > "dist/${pkg}.zip.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: argus-${{ matrix.target }}
          path: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.sha256
          if-no-files-found: error

  publish:
    name: publish release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.publish_release && inputs.release_tag != '')
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag || github.ref_name }}
          files: release-assets/*
          generate_release_notes: true
